replicaCount: 3

image:
  repository: todo-app
  tag: latest
  pullPolicy: Never

app:
  port: 8000

service:
  port: 80

ingress:
  host: todo.localhost

postgres:
  image: postgres:16-alpine
  database: todo_db
  user: todo_user
  storage: 1Gi
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "250m"

resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"
